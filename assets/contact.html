<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400..900;1,400..900&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/styles.css" />
    <title>Garrett Lane - Contact</title>
  </head>
  <body>
    <!--NavBar-->
    <nav class="navbar">
      <div class="navbar-container">
        <!-- Logo -->
        <a class="navbar-brand" href="../index.html">
          <div class="logo-container">
            <img src="./images/logo.png" alt="Logo" class="logo default-logo" />
            <img
              src="./images/logoGreen.png"
              alt="Logo Hover"
              class="logo hover-logo"
            />
          </div>
        </a>
        <!-- Toggler -->
        <button
          class="navbar-toggler"
          type="button"
          onclick="toggleMenu()"
          aria-label="Toggle navigation"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <!-- Navbar Links -->
        <div class="navbar-menu" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="../index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./projects.html">Projects</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./resume.html">Resume</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="./contact.html">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Contact Section -->
    <section class="contact-section">
      <div class="container">
        <div class="contact-container">
          <h1 class="H1">Get In Touch</h1>
          <p class="lead">
            Have a project in mind? Let's discuss how we can work together.
          </p>

          <form id="contactForm" class="contact-form">
            <!-- Name -->
            <div class="form-group">
              <label for="name" class="form-label">Full Name *</label>
              <input
                type="text"
                id="name"
                name="name"
                required
                class="form-input"
                placeholder="Enter your full name"
              />
            </div>

            <!-- Phone Number -->
            <div class="form-group">
              <label for="phone" class="form-label">Phone Number *</label>
              <input
                type="tel"
                id="phone"
                name="phone"
                required
                class="form-input"
                placeholder="(123) 456-7890"
              />
            </div>

            <!-- Email Address -->
            <div class="form-group">
              <label for="email" class="form-label">Email Address *</label>
              <input
                type="email"
                id="email"
                name="email"
                required
                class="form-input"
                placeholder="your.email@example.com"
              />
            </div>

            <!-- Project Description -->
            <div class="form-group">
              <label for="message" class="form-label"
                >Project Description *</label
              >
              <textarea
                id="message"
                name="message"
                required
                class="form-textarea"
                placeholder="Tell me about your project or request..."
                rows="6"
              ></textarea>
            </div>

            <!-- File Upload -->
            <div class="form-group">
              <label for="photos" class="form-label"
                >Reference Photos (Optional)</label
              >
              <input
                type="file"
                id="photos"
                name="photos"
                multiple
                accept="image/*"
                class="form-input-file"
              />
              <p class="form-help">
                You can upload multiple images as reference materials
              </p>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-button">Send Message →</button>
          </form>

          <p class="form-note">* Required fields</p>
        </div>
      </div>
    </section>
    <hr />

    <!--Footer-->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-left">
            <span class="footer-text"
              >© <span id="year"></span> Garrett Lane</span
            >
          </div>
          <div class="footer-middle">
            <ul class="footer-links">
              <li>
                <a
                  href="https://www.instagram.com/codingexpat/"
                  target="_blank"
                  aria-label="Instagram"
                  ><img
                    src="./images/instagram.svg"
                    width="24"
                    height="24"
                    alt="instagram logo"
                /></a>
              </li>
              <li>
                <a
                  href="https://www.linkedin.com/in/garrett-lane-260a37337/"
                  target="_blank"
                  aria-label="Linkedin"
                  ><img
                    src="./images/linkedin.svg"
                    width="24"
                    height="24"
                    alt="linkedin logo"
                /></a>
              </li>
              <li>
                <a
                  href="https://x.com/codingexpat"
                  target="_blank"
                  aria-label="X"
                  ><img
                    src="./images/twitter-x.svg"
                    width="24"
                    height="24"
                    alt="x logo"
                /></a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </footer>

    <!--Scripts-->
    <script
      type="text/javascript"
      src="https://cdn.emailjs.com/sdk/3.x/email.min.js"
    ></script>
    <script src="./scripts/script.js"></script>
    <script src="./scripts/contact.js"></script>
  </body>
</html>
